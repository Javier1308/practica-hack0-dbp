<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz de Git & GitHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
      color: #1a1a18;
    }

    .container { width: 100%; max-width: 640px; }

    .header { margin-bottom: 2rem; }
    .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .header h1 { font-size: 22px; font-weight: 500; color: #1a1a18; }
    .header p { font-size: 14px; color: #6b6b67; }

    /* --- NAME SCREEN --- */
    .name-card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 2rem;
    }
    .name-card h2 { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
    .name-card p { font-size: 14px; color: #6b6b67; margin-bottom: 1.25rem; line-height: 1.5; }
    .name-input {
      width: 100%;
      padding: 11px 14px;
      border: 0.5px solid rgba(0,0,0,0.22);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      color: #1a1a18;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
    }
    .name-input:focus { border-color: #1D9E75; box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
    .btn-start {
      width: 100%;
      padding: 11px;
      background: #1a1a18;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-start:hover { opacity: 0.85; }
    .btn-start:disabled { opacity: 0.4; cursor: default; }

    /* --- PROGRESS --- */
    .progress-label { font-size: 13px; color: #6b6b67; margin-bottom: 6px; }
    .progress-bar-wrap { background: #e2e1db; border-radius: 100px; height: 6px; margin-bottom: 1.5rem; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: #1D9E75; border-radius: 100px; transition: width 0.4s ease; }

    /* --- QUESTION --- */
    .question-card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .question-number { font-size: 11px; color: #6b6b67; margin-bottom: 8px; letter-spacing: 0.07em; text-transform: uppercase; }
    .question-text { font-size: 16px; font-weight: 500; color: #1a1a18; line-height: 1.55; margin-bottom: 1.25rem; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.22);
      border-radius: 8px;
      padding: 12px 16px;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      color: #1a1a18;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s, border-color 0.15s;
      line-height: 1.4;
    }
    .option-btn:hover:not(:disabled) { background: #f5f4f0; border-color: rgba(0,0,0,0.35); }
    .option-btn:disabled { cursor: default; }
    .option-btn.correct { border: 1.5px solid #1D9E75; background: #E1F5EE; color: #085041; }
    .option-btn.wrong   { border: 1.5px solid #D85A30; background: #FAECE7; color: #4A1B0C; }
    .option-btn.skipped { opacity: 0.45; }
    .option-letter {
      width: 26px; height: 26px; border-radius: 50%;
      border: 0.5px solid rgba(0,0,0,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500; flex-shrink: 0; color: #6b6b67;
    }
    .option-btn.correct .option-letter { border-color: #1D9E75; background: #1D9E75; color: #fff; }
    .option-btn.wrong   .option-letter { border-color: #D85A30; background: #D85A30; color: #fff; }

    .feedback-box {
      margin-top: 1rem; padding: 12px 16px;
      font-size: 14px; line-height: 1.6;
      border-left: 3px solid;
    }
    .feedback-box.correct-fb { background: #E1F5EE; color: #085041; border-color: #1D9E75; }
    .feedback-box.wrong-fb   { background: #FAECE7; color: #4A1B0C; border-color: #D85A30; }

    .nav-row { display: flex; justify-content: flex-end; margin-top: 1.5rem; }
    .btn-next {
      background: #fff; border: 0.5px solid rgba(0,0,0,0.22);
      border-radius: 8px; padding: 10px 22px;
      cursor: pointer; font-size: 14px; font-family: inherit; color: #1a1a18;
      transition: background 0.15s;
    }
    .btn-next:hover { background: #f5f4f0; }
    .btn-next:disabled { opacity: 0.4; cursor: default; }

    /* --- RESULT --- */
    .score-card {
      background: #fff; border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px; padding: 2.5rem 2rem;
      text-align: center; margin-bottom: 1.5rem;
    }
    .score-name { font-size: 14px; color: #6b6b67; margin-bottom: 4px; }
    .score-big { font-size: 60px; font-weight: 500; color: #1a1a18; line-height: 1; }
    .score-label { font-size: 14px; color: #6b6b67; margin-top: 8px; }
    .score-badge { display: inline-block; padding: 6px 18px; border-radius: 100px; font-size: 13px; font-weight: 500; margin-top: 1rem; }
    .badge-gold   { background: #FAEEDA; color: #633806; }
    .badge-silver { background: #D3D1C7; color: #2C2C2A; }
    .badge-bronze { background: #FAECE7; color: #4A1B0C; }

    .sending-msg { font-size: 13px; color: #6b6b67; text-align: center; margin-top: 1rem; }
    .sent-ok  { color: #1D9E75; }
    .sent-err { color: #D85A30; }

    .review-item {
      padding: 10px 14px; border-radius: 8px; margin-bottom: 8px;
      font-size: 13px; display: flex; align-items: flex-start; gap: 8px; line-height: 1.5;
    }
    .review-item.r-correct { background: #E1F5EE; color: #085041; }
    .review-item.r-wrong   { background: #FAECE7; color: #4A1B0C; }
    .review-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .dot-ok  { background: #1D9E75; }
    .dot-bad { background: #D85A30; }

    .btn-restart {
      background: #fff; border: 0.5px solid rgba(0,0,0,0.22);
      border-radius: 8px; padding: 10px 28px;
      cursor: pointer; font-size: 14px; font-family: inherit; color: #1a1a18;
      display: block; margin: 1.5rem auto 0;
      transition: background 0.15s;
    }
    .btn-restart:hover { background: #f5f4f0; }

    /* --- ADMIN --- */
    .admin-login {
      background: #fff; border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px; padding: 2rem;
    }
    .admin-login h2 { font-size: 17px; font-weight: 500; margin-bottom: 1rem; }
    .admin-table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left; font-weight: 500; font-size: 12px;
      color: #6b6b67; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 8px 12px; border-bottom: 0.5px solid rgba(0,0,0,0.12);
    }
    td { padding: 10px 12px; border-bottom: 0.5px solid rgba(0,0,0,0.07); color: #1a1a18; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f5f4f0; }
    .pill {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-size: 12px; font-weight: 500;
    }
    .pill-gold   { background: #FAEEDA; color: #633806; }
    .pill-silver { background: #D3D1C7; color: #2C2C2A; }
    .pill-bronze { background: #FAECE7; color: #4A1B0C; }
    .admin-meta { font-size: 13px; color: #6b6b67; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
    .btn-refresh {
      background: #fff; border: 0.5px solid rgba(0,0,0,0.22);
      border-radius: 6px; padding: 6px 14px;
      cursor: pointer; font-size: 13px; font-family: inherit; color: #1a1a18;
    }
    .btn-refresh:hover { background: #f5f4f0; }
    .admin-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.5rem; }
    .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    .stat-box { background: #f5f4f0; border-radius: 8px; padding: 1rem; text-align: center; }
    .stat-num { font-size: 28px; font-weight: 500; color: #1a1a18; }
    .stat-lbl { font-size: 12px; color: #6b6b67; margin-top: 2px; }
    .empty-state { text-align: center; padding: 2rem; color: #6b6b67; font-size: 14px; }

    code {
      font-family: 'SFMono-Regular', Consolas, monospace;
      background: #ece9e3; padding: 2px 6px; border-radius: 4px;
      font-size: 13px; color: #1a1a18;
    }

    @media (max-width: 480px) {
      body { padding: 1rem 0.75rem 3rem; }
      .question-card { padding: 1.25rem; }
      .score-big { font-size: 48px; }
      .stat-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="6" cy="6" r="2.5" fill="currentColor"/>
        <circle cx="18" cy="6" r="2.5" fill="currentColor"/>
        <circle cx="6" cy="18" r="2.5" fill="currentColor"/>
        <rect x="5" y="8.5" width="2" height="7" fill="currentColor"/>
        <path d="M8.5 6h7" stroke="currentColor" stroke-width="2"/>
        <path d="M8.5 18h4a5.5 5.5 0 0 0 5.5-5.5V8.5" stroke="currentColor" stroke-width="2"/>
      </svg>
      <h1 id="page-title">Quiz de Git &amp; GitHub</h1>
    </div>
    <p id="page-sub">Conceptos básicos de control de versiones</p>
  </div>

  <div id="app"></div>
</div>

<script>
  const SHEET_URL = "https://script.google.com/a/macros/utec.edu.pe/s/AKfycbzFSJ5nqKTpzYUBYxfuZ0qVb8l0Q65iwQHaeG3UJkQgxEvqH_QzGiY-OEF9qc-wxCsjzw/exec";
  const ADMIN_PASS = "profegit2024";

  const questions = [
    {
      text: "¿Para qué sirve <code>git init</code>?",
      options: ["Para descargar un repositorio de internet","Para crear un repositorio Git nuevo en tu carpeta","Para subir tus archivos a GitHub","Para ver el historial de cambios"],
      correct: 1,
      feedback: "git init convierte tu carpeta en un repositorio Git. Crea una carpeta oculta .git que empieza a rastrear todos tus cambios desde ese momento."
    },
    {
      text: "¿Qué hace <code>git add</code>?",
      options: ["Guarda los cambios definitivamente en el historial","Sube los archivos a GitHub","Prepara los archivos que quieres guardar en el próximo commit","Crea una rama nueva"],
      correct: 2,
      feedback: "git add selecciona qué archivos quieres incluir en el próximo commit. Es como poner cosas en una caja antes de cerrarla y etiquetarla."
    },
    {
      text: "¿Qué hace <code>git commit</code>?",
      options: ["Sube los cambios a internet","Guarda una foto del estado actual de tu código en el historial","Descarga los últimos cambios del equipo","Crea una copia del repositorio"],
      correct: 1,
      feedback: "git commit guarda un punto en el historial con todos los archivos que preparaste con git add. Siempre lleva un mensaje que describe qué cambiaste."
    },
    {
      text: "¿Cuál es el orden correcto para guardar y subir cambios?",
      options: ["git commit → git add → git push","git push → git commit → git add","git add → git push → git commit","git add → git commit → git push"],
      correct: 3,
      feedback: "Primero preparas los archivos (git add), luego los guardas en el historial local (git commit), y finalmente los subes al repositorio remoto (git push)."
    },
    {
      text: "¿Para qué sirve <code>git push</code>?",
      options: ["Para descargar los cambios de tus compañeros","Para crear una rama nueva en GitHub","Para subir tus commits al repositorio en GitHub","Para ver qué archivos cambiaron"],
      correct: 2,
      feedback: "git push envía tus commits locales al repositorio remoto (GitHub). Así tus compañeros pueden ver y descargar tu trabajo."
    },
    {
      text: "¿Para qué sirve <code>git pull</code>?",
      options: ["Para subir tus cambios a GitHub","Para descargar y aplicar los cambios que otros subieron a GitHub","Para crear un commit nuevo","Para eliminar una rama"],
      correct: 1,
      feedback: "git pull descarga los cambios que tus compañeros subieron a GitHub y los aplica en tu copia local. Es lo que haces al inicio del día para estar al día."
    },
    {
      text: "¿Qué es una rama (branch) en Git?",
      options: ["Una copia del repositorio en otro servidor","Un archivo que guarda el historial de cambios","Una línea de trabajo independiente para desarrollar sin afectar el código principal","El nombre del repositorio en GitHub"],
      correct: 2,
      feedback: "Una rama es como una línea paralela de trabajo. Puedes hacer cambios en tu rama sin tocar el código principal (main), y luego unirlos cuando estén listos."
    },
    {
      text: "Ejecutas <code>git switch -c feature/login</code>. ¿Qué pasa?",
      options: ["Eliminas la rama feature/login","Creas una nueva rama llamada feature/login y te mueves a ella","Fusionas feature/login con main","Descargas la rama feature/login de GitHub"],
      correct: 1,
      feedback: "git switch -c crea una rama nueva y te cambia a ella en un solo paso. El -c significa 'create'. A partir de ese momento tus commits van a esa rama."
    },
    {
      text: "¿Qué hace <code>git merge</code>?",
      options: ["Subir una rama a GitHub","Eliminar commits del historial","Unir los cambios de una rama con otra","Ver las diferencias entre dos archivos"],
      correct: 2,
      feedback: "git merge toma los cambios de una rama y los une con otra. Por ejemplo, cuando terminas una feature, haces merge de tu rama a main para integrar el código."
    },
    {
      text: "¿Qué es un Pull Request (PR) en GitHub?",
      options: ["Un comando para descargar cambios del repositorio","Una solicitud para que el equipo revise y apruebe tus cambios antes de hacer merge","Una forma de eliminar una rama remota","Un error que ocurre cuando hay conflictos"],
      correct: 1,
      feedback: "Un Pull Request es una propuesta de cambio en GitHub. Le dices al equipo 'quiero fusionar esta rama, ¿pueden revisarla?'. Permite comentarios y aprobación antes del merge."
    }
  ];

  const letters = ['A','B','C','D'];
  let state = { screen: 'name', nombre: '', current: 0, score: 0, answered: false, results: [] };

  function isAdmin() { return window.location.hash === '#admin'; }

  function render() {
    if (isAdmin()) { renderAdmin(); return; }
    if (state.screen === 'name')   renderName();
    if (state.screen === 'quiz')   renderQuiz();
    if (state.screen === 'result') renderResult();
  }

  /* ---- NAME SCREEN ---- */
  function renderName() {
    document.getElementById('page-title').textContent = 'Quiz de Git & GitHub';
    document.getElementById('page-sub').textContent = 'Conceptos básicos de control de versiones';
    document.getElementById('app').innerHTML = `
      <div class="name-card">
        <h2>¡Bienvenido!</h2>
        <p>Escribe tu nombre completo antes de empezar. Tu resultado se guardará automáticamente.</p>
        <input class="name-input" id="nombre-input" type="text" placeholder="Tu nombre completo" maxlength="80" />
        <button class="btn-start" id="btn-start" onclick="startQuiz()" disabled>Comenzar quiz →</button>
      </div>`;
    const inp = document.getElementById('nombre-input');
    const btn = document.getElementById('btn-start');
    inp.addEventListener('input', () => { btn.disabled = inp.value.trim().length < 2; });
    inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !btn.disabled) startQuiz(); });
    inp.focus();
  }

  function startQuiz() {
    const inp = document.getElementById('nombre-input');
    state.nombre = inp.value.trim();
    if (state.nombre.length < 2) return;
    state.screen = 'quiz';
    state.current = 0; state.score = 0; state.answered = false; state.results = [];
    render();
  }

  /* ---- QUIZ SCREEN ---- */
  function renderQuiz() {
    const q = questions[state.current];
    const pct = (state.current / questions.length) * 100;
    document.getElementById('app').innerHTML = `
      <p class="progress-label">Pregunta ${state.current + 1} de ${questions.length}</p>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="question-card">
        <p class="question-number">Pregunta ${state.current + 1}</p>
        <p class="question-text">${q.text}</p>
        <div class="options">${q.options.map((o, i) => `
          <button class="option-btn" id="opt-${i}" onclick="pick(${i})">
            <span class="option-letter">${letters[i]}</span><span>${o}</span>
          </button>`).join('')}
        </div>
        <div id="fb"></div>
      </div>
      <div class="nav-row">
        <button class="btn-next" id="btn-next" onclick="nextQ()" disabled>
          ${state.current < questions.length - 1 ? 'Siguiente →' : 'Ver resultado'}
        </button>
      </div>`;
    state.answered = false;
  }

  function pick(idx) {
    if (state.answered) return;
    state.answered = true;
    const q = questions[state.current];
    const ok = idx === q.correct;
    if (ok) state.score++;
    state.results.push({ q: q.text.replace(/<[^>]+>/g,''), correct: ok, ans: q.options[q.correct] });
    q.options.forEach((_, i) => {
      const b = document.getElementById('opt-' + i);
      b.disabled = true;
      if (i === q.correct) b.classList.add('correct');
      else if (i === idx && !ok) b.classList.add('wrong');
      else b.classList.add('skipped');
    });
    document.getElementById('fb').innerHTML = `
      <div class="feedback-box ${ok ? 'correct-fb' : 'wrong-fb'}">
        ${ok ? '✓ Correcto. ' : '✗ Incorrecto. '}${q.feedback}
      </div>`;
    document.getElementById('btn-next').disabled = false;
  }

  function nextQ() {
    state.current++;
    if (state.current < questions.length) renderQuiz();
    else { state.screen = 'result'; render(); sendResult(); }
  }

  /* ---- RESULT SCREEN ---- */
  function renderResult() {
    const pct = Math.round((state.score / questions.length) * 100);
    const badge = pct >= 90
      ? '<span class="score-badge badge-gold">Experto en Git</span>'
      : pct >= 60
      ? '<span class="score-badge badge-silver">Buen nivel</span>'
      : '<span class="score-badge badge-bronze">Sigue practicando</span>';
    const review = state.results.map((r, i) => `
      <div class="review-item ${r.correct ? 'r-correct' : 'r-wrong'}">
        <div class="review-dot ${r.correct ? 'dot-ok' : 'dot-bad'}"></div>
        <div>
          <strong>P${i+1}:</strong> ${r.q.substring(0,70)}${r.q.length > 70 ? '...' : ''}
          ${!r.correct ? `<br><span style="font-size:12px;opacity:0.85;">Respuesta correcta: ${r.ans}</span>` : ''}
        </div>
      </div>`).join('');
    document.getElementById('app').innerHTML = `
      <div class="score-card">
        <div class="score-name">${state.nombre}</div>
        <div class="score-big">${state.score}/${questions.length}</div>
        <div class="score-label">${pct}% de aciertos</div>
        ${badge}
        <div class="sending-msg" id="send-status">Guardando resultado...</div>
      </div>
      <div style="margin-top:1.5rem;">
        <p class="progress-label" style="margin-bottom:10px;">Resumen de respuestas</p>
        ${review}
      </div>
      <button class="btn-restart" onclick="restart()">Reiniciar quiz</button>`;
  }

  async function sendResult() {
    try {
      await fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre: state.nombre, puntaje: state.score, total: questions.length })
      });
      const el = document.getElementById('send-status');
      if (el) { el.textContent = '✓ Resultado guardado correctamente'; el.classList.add('sent-ok'); }
    } catch(err) {
      const el = document.getElementById('send-status');
      if (el) { el.textContent = '⚠ No se pudo guardar el resultado'; el.classList.add('sent-err'); }
    }
  }

  function restart() {
    state = { screen: 'name', nombre: '', current: 0, score: 0, answered: false, results: [] };
    render();
  }

  /* ---- ADMIN SCREEN ---- */
  let adminAuth = false;
  let adminData = [];

  function renderAdmin() {
    document.getElementById('page-title').textContent = 'Panel de resultados';
    document.getElementById('page-sub').textContent = 'Vista exclusiva del profesor';
    if (!adminAuth) {
      document.getElementById('app').innerHTML = `
        <div class="admin-login">
          <h2>Acceso restringido</h2>
          <input class="name-input" id="pass-input" type="password" placeholder="Contraseña" style="margin-bottom:1rem;" />
          <button class="btn-start" onclick="checkPass()">Entrar</button>
          <p id="pass-err" style="color:#D85A30;font-size:13px;margin-top:10px;display:none;">Contraseña incorrecta</p>
        </div>`;
      document.getElementById('pass-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPass(); });
      document.getElementById('pass-input').focus();
    } else {
      renderAdminPanel();
    }
  }

  function checkPass() {
    const v = document.getElementById('pass-input').value;
    if (v === ADMIN_PASS) { adminAuth = true; renderAdminPanel(); }
    else { document.getElementById('pass-err').style.display = 'block'; }
  }

  async function fetchAdminData() {
    try {
      const res = await fetch(SHEET_URL + '?action=get');
      const json = await res.json();
      adminData = json.data || [];
    } catch(e) { adminData = []; }
    renderAdminPanel();
  }

  function renderAdminPanel() {
    const total = adminData.length;
    const avg = total ? Math.round(adminData.reduce((s,r) => s + (r.puntaje/r.total*100), 0) / total) : 0;
    const top = total ? Math.max(...adminData.map(r => r.puntaje)) : 0;

    const rows = adminData.length === 0
      ? `<tr><td colspan="4" class="empty-state">Aún no hay resultados. Actualiza en unos segundos.</td></tr>`
      : [...adminData].reverse().map(r => {
          const pct = Math.round(r.puntaje / r.total * 100);
          const pillClass = pct >= 90 ? 'pill-gold' : pct >= 60 ? 'pill-silver' : 'pill-bronze';
          return `<tr>
            <td>${r.nombre}</td>
            <td>${r.puntaje}/${r.total}</td>
            <td><span class="pill ${pillClass}">${pct}%</span></td>
            <td style="color:#6b6b67;font-size:12px;">${r.fecha || ''}</td>
          </tr>`;
        }).join('');

    document.getElementById('app').innerHTML = `
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-lbl">Alumnos</div></div>
        <div class="stat-box"><div class="stat-num">${avg}%</div><div class="stat-lbl">Promedio</div></div>
        <div class="stat-box"><div class="stat-num">${top}/${questions.length}</div><div class="stat-lbl">Puntaje más alto</div></div>
      </div>
      <div class="admin-card">
        <div class="admin-meta">
          <span>${total} resultado${total !== 1 ? 's' : ''}</span>
          <button class="btn-refresh" onclick="fetchAdminData()">↻ Actualizar</button>
        </div>
        <div class="admin-table-wrap">
          <table>
            <thead><tr><th>Nombre</th><th>Puntaje</th><th>%</th><th>Hora</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;

    if (total === 0) fetchAdminData();
  }

  window.addEventListener('hashchange', () => { adminAuth = false; render(); });
  render();
  if (isAdmin()) fetchAdminData();
</script>
</body>
</html>
