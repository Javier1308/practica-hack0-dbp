<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Javier Olivares</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --card: #161616;
      --border: #2a2a2a;
      --accent: #c8f75e;
      --text: #f0ede6;
      --muted: #6b6b6b;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
      animation: fadeUp .6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      color: #0e0e0e;
      margin-bottom: 2rem;
      letter-spacing: -1px;
    }

    .label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .35rem;
    }

    .name {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1.5px;
      margin-bottom: 2rem;
    }

    .name span {
      color: var(--accent);
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1.5rem;
    }

    .field { flex: 1; }

    .field-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .3rem;
    }

    .field-value {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      color: var(--text);
      line-height: 1.4;
    }

    .age-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: .04em;
    }

    .uni-tag {
      display: inline-block;
      margin-top: .75rem;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--border);
      padding: 3px 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">JO</div>

    <div class="label">Perfil</div>
    <h1 class="name">Jose<br><span>Huamani</span></h1>

    <hr>

    <div class="row">
      <div class="field">
        <div class="field-label">Edad</div>
        <span class="age-badge">20 años</span>
      </div>
      <div class="field">
        <div class="field-label">Universidad</div>
        <div class="field-value" style="font-size:.9rem;font-weight:700;font-family:'Syne',sans-serif">UTEC</div>
        <span class="uni-tag">Lima, Perú</span>
      </div>
    </div>

    <hr>

    <div class="field">
      <div class="field-label">Carrera</div>
      <div class="field-value">Ciencias de la Computación</div>
    </div>
  </div>
</body>
</html>
